baseurl = "https://www.jackbeoris.me/"
languageCode = "en-us"
title = "Jack Beoris"
theme = "hugo-strata-theme"

[params]
	# To provide some metadata for search engines feel free to add a few
    # information about you and your website.
	name = "Jack Beoris"
	description = "Personal website of a full-stack software engineer."

	# Enable Google Analytics by inserting your tracking code
	googleAnalytics = "UA-55146606-3"


	[params.sidebar]
		# Replace the avatar with a picture of your own under static/images
		avatar = "headshot.jpg"
		background = "santa_monica.jpg"
		# Use Markdown to format the string. This works nearly all over the theme
		bio = "**Founder & CTO** at [Babble](https://www.babble.app): A platform crafted to improve the way groups chat."
		# The icons will be shown if you enter your username
		twitter = "JackBeoris"
		github = "jbeoris"
		facebook = "JackBeoris"

		copyright = [
			"&copy; Jack Beoris",
			"Built With: [HUGO](//gohugo.io)"
		]


	[params.about]
		title = "A little about me"
		content = "I am a full-stack engineer and graduate of The University of Texas at Austin with two degrees: B.S. in Physics and B.S. in Mathematics. I am passionate about application development, the evolution of programming languages and paradigms, and the future of tech as a whole. Most recently, I co-founded and am the CTO of Babble, a platform striving to improve the way groups communicate."


	[params.portfolio]
		title = "Recent Work"

		# The images and thumbnails are stored under static/images
		# Create and change subfolders as you like
		[[params.portfolio.gallery]]
			image = "fulls/01.jpg"
			thumb = "thumbs/01.jpg"
			title = "ThreadFix"
			description = "An application vulnerability management tool for organizations that build software."

		[[params.portfolio.gallery]]
			image = "fulls/02.jpg"
			thumb = "thumbs/02.jpg"
			title = "Ya Laugh Ya Lose."
			description = "A funny picture website designed for sharing on social-media sites."

		[[params.portfolio.gallery]]
			image = "fulls/04.jpg"
			thumb = "thumbs/07.jpg"
			title = "Krue TV"
			description = "Live streaming designed to make experiencing music interactive."

		[[params.portfolio.gallery]]
			image = "fulls/07.jpg"
			thumb = "thumbs/08.jpg"
			title = "Babble"
			description = "Making group chats better."

	[params.contact]
		title = "Get In Touch"
		content = "Feel free to reach out to me on social media as well."

		address = [
			"655 Montgomery St.",
			"San Francisco, CA 94111",
			"United States"
		]
		phone = "832-622-2880"

		# Since this template is static, the contact form uses www.formspree.io as a
		# proxy. The form makes a POST request to their servers to send the actual
		# email. Visitors can send up to a 1000 emails each month for free.
	    #
	    # What you need to do for the setup?
	    #
	    # - set your email address under 'email' below
	    # - upload the generated site to your server
	    # - send a dummy email yourself to confirm your account
	    # - click the confirm link in the email from www.formspree.io
	    # - you're done. Happy mailing!
		email = "jack@babble.app"

		[params.contact.form]
			# Set custom strings for the form if your native
			# language isn't English
			name = "Name"
			email = "Email"
			message = "Message"
			submit = "Send message"